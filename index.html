<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digatal - Clock</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unicons.iconscout.com/release/v4.2.0/css/line.css">
</head>

<body>
    <main>
        <div class="header">
            <div class="brand">
                <div class="logo">
                    CL
                </div>
                <div>
                    <div class="tittle">Digital Clock</div>
                    <div class="subtitle">12/24 hour - Dark mode only</div>
                </div>
            </div>
            <div class="toggle">
                <div class="btn activeToggle" id="btn-12">12 hr</div>
                <div class="btn" id="btn-24">24 hr</div>
            </div>
        </div>
        <div class="display">
            <div class="time-wrap">
                <div class="time" id="">00:00:00</div>
                <div class="ampm" id="ampm">AM</div>
            </div>
            <div class="meta">
                <div id="date">january 1, 2026</div>
                <div id="day">Monday</div>
            </div>
        </div>
        <div class="foot">
            <div>auto update every sceond</div>
            <div>Local time</div>
        </div>
    </main>




    <script src="script.js"></script>
</body>

</html>
